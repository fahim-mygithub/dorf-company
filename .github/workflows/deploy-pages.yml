name: Deploy Web Build to GitHub Pages

# Manual trigger: run this when a milestone is ready for external testers.
# (Add `push: { branches: [main] }` here later if you want auto-deploy on every push.)
on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time.
concurrency:
  group: "pages"
  cancel-in-progress: true

env:
  GODOT_VERSION: "4.7"
  EXPORT_DIR: "build/web"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The web build ships exactly two fonts and the browser has NO OS fallbacks —
      # any UI character outside their cmaps renders as tofu on Pages while looking
      # fine in the editor. Fail the deploy before wasting an export.
      - name: Validate web glyph coverage
        run: |
          pip install --quiet fonttools
          python3 scripts/check_web_glyphs.py

      - name: Install Godot + export templates
        run: |
          set -euo pipefail
          BASE="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
          curl -fL -o godot.zip "$BASE/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          curl -fL -o templates.tpz "$BASE/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q godot.zip
          sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          sudo chmod +x /usr/local/bin/godot
          mkdir -p "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable"
          unzip -q templates.tpz
          mv templates/* "$HOME/.local/share/godot/export_templates/${GODOT_VERSION}.stable/"
          godot --version

      - name: Strip editor-only MCP plugin (paid; not needed in the build)
        run: |
          # Remove godot-mcp-pro autoloads + plugin-enable so the web build is clean.
          sed -i '/addons\/godot_mcp/d' project.godot

      - name: Import project (generate .godot)
        run: |
          godot --headless --import 2>&1 || true
          godot --headless --import 2>&1 || true

      - name: Export Web build (main menu — solo / host / join)
        run: |
          set -euo pipefail
          # The root build boots the MENU, not combat: it is the entry point for co-op
          # (Host Room / Join Room), and Solo Play still reaches the same combat scene.
          sed -i 's#^run/main_scene=.*#run/main_scene="res://scenes/menu/main_menu.tscn"#' project.godot
          grep -q 'menu/main_menu.tscn' project.godot   # fail loud if the sed no-ops
          mkdir -p "${EXPORT_DIR}"
          godot --headless --export-release "Web" "${EXPORT_DIR}/index.html"
          ls -la "${EXPORT_DIR}"
          test -f "${EXPORT_DIR}/index.html"

      - name: Export Web Overworld build
        run: |
          set -euo pipefail
          # CI-only checkout copy. Replace the whole line so this is independent of whatever the base Web export left.
          sed -i 's#^run/main_scene=.*#run/main_scene="res://scenes/overworld/overworld.tscn"#' project.godot
          grep -q 'overworld/overworld.tscn' project.godot   # fail loud if the sed no-ops
          mkdir -p "${EXPORT_DIR}/overworld"
          godot --headless --export-release "Web Overworld" "${EXPORT_DIR}/overworld/index.html"
          ls -la "${EXPORT_DIR}/overworld"
          test -f "${EXPORT_DIR}/overworld/index.html"

      - name: Add cross-origin-isolation shim + .nojekyll
        run: |
          curl -fL -o "${EXPORT_DIR}/coi-serviceworker.min.js" \
            https://raw.githubusercontent.com/gzuidhof/coi-serviceworker/master/coi-serviceworker.min.js
          # Inject the shim as the first <head> script (enables SharedArrayBuffer on Pages).
          sed -i 's#<head>#<head><script src="coi-serviceworker.min.js"></script>#' "${EXPORT_DIR}/index.html"
          # Same shim for the overworld build; overworld/index.html sits one dir below coi-serviceworker.min.js.
          sed -i 's#<head>#<head><script src="../coi-serviceworker.min.js"></script>#' "${EXPORT_DIR}/overworld/index.html"
          # Pages would otherwise strip files Jekyll dislikes.
          touch "${EXPORT_DIR}/.nojekyll"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.EXPORT_DIR }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
