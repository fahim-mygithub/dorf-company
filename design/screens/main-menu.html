<!doctype html>
<html lang="en"><head><meta charset="utf-8">
<title>Main Menu</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0b0b0e;color:#e6e7ea;
  font-family:"Segoe UI",system-ui,-apple-system,"Noto Sans",sans-serif}
.wrap{padding:20px;display:flex;flex-direction:column;align-items:center;gap:12px}
.cap{width:720px;display:flex;align-items:baseline;gap:10px;font-size:13px;color:#8b8b99}
.cap b{color:#e6e7ea;font-size:15px;font-weight:600;letter-spacing:.02em}
.cap code{font-family:ui-monospace,Consolas,monospace;font-size:11px;color:#6b6b7a;margin-left:auto}
.stage{position:relative;width:720px;height:1280px;background:#17171f;overflow:hidden;
  border:1px solid #2c2c38;border-radius:4px}
.stage *{position:absolute}
.l{display:flex;align-items:flex-start;line-height:1.15;white-space:pre-wrap}
.c{justify-content:center;text-align:center}
.r{justify-content:flex-end;text-align:right}
/* Godot 4 default Button, approximated */
.btn{display:flex;align-items:center;justify-content:center;text-align:center;
  background:#33373f;border:1px solid #4a4f5a;border-radius:3px;color:#e4e6ea;
  line-height:1.2;white-space:pre-line}
.btn.on{background:#3f5a46;border-color:#5f8a6b}
.btn.off{background:#26282e;border-color:#34363d;color:#6e7078}
.le{display:flex;align-items:center;justify-content:center;background:#2a2c33;
  border:1px solid #43464f;border-radius:3px;color:#7c7f88}

.stage{height:1280px}
</style></head>
<body>
<div class="wrap">
<div class="cap"><b>Main Menu</b><span>Solo · Host · Join — shown in the Join state</span><code>scenes/menu/main_menu.tscn</code></div>
<div class="stage"><div style="left:0px;top:0px;width:720px;height:1280px;background:#17171f;"></div>
<div class="l c" style="left:0px;top:210px;width:720px;height:64px;font-size:46px;color:#ffffff;">DORF COMPANY</div>
<div class="l c" style="left:0px;top:286px;width:720px;height:30px;font-size:20px;color:#b3b3c7;">- a quarterly raid -</div>
<div class="l c" style="left:0px;top:344px;width:720px;height:64px;font-size:44px;color:#ffffff;">🛡️   ⛑️   🧙</div>
<div class="btn" style="left:210px;top:560px;width:300px;height:64px;font-size:24px;">Solo Play</div>
<div class="btn" style="left:210px;top:650px;width:300px;height:64px;font-size:24px;">Host Room</div>
<div class="btn" style="left:210px;top:740px;width:300px;height:64px;font-size:24px;">Join Room</div>
<div class="le" style="left:210px;top:832px;width:300px;height:52px;font-size:22px">ROOM CODE</div>
<div class="l c" style="left:0px;top:908px;width:720px;height:28px;font-size:16px;color:#e6cc73;">enter a room code, then press Enter</div>
<div class="l c" style="left:0px;top:1224px;width:720px;height:22px;font-size:13px;color:#6b6b7a;">build 276b578</div>
</div>
</div>
</body></html>
